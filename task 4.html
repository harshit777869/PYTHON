<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>ML Prediction</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
        }

        .container{
            width:400px;
            margin:50px auto;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        input{
            width:100%;
            padding:10px;
            margin-bottom:15px;
        }

        button{
            padding:10px 20px;
            background:purple;
            color:white;
            border:none;
            cursor:pointer;
        }

        h2{
            margin-top:20px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Spam Detection</h1>

        <input
        type="text"
        id="message"
        placeholder="Enter Message">

        <button onclick="predictSpam()">
            Predict
        </button>

        <h2 id="result"></h2>

    </div>

    <script>

        function predictSpam(){

            const message =
            document.getElementById(
                "message"
            ).value.toLowerCase();

            let result = "";

            if(
                message.includes("win") ||
                message.includes("free") ||
                message.includes("offer")
            ){

                result = "Spam Message";
            }

            else{

                result = "Normal Message";
            }

            document.getElementById(
                "result"
            ).innerHTML =
            result;
        }

    </script>

</body>
</html>
