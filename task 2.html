<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Report Generator</title>

    <script src=
    "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
    </script>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
        }

        .container{
            width:80%;
            margin:auto;
            padding:20px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
        }

        textarea{
            width:100%;
            height:200px;
            padding:10px;
        }

        button{
            padding:10px 20px;
            background:green;
            color:white;
            border:none;
            margin-top:20px;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="container">

        <div class="card">

            <h1>PDF Report Generator</h1>

            <textarea
            id="reportText"
            placeholder="Write Report Here">
            </textarea>

            <button onclick="generatePDF()">
                Download PDF
            </button>

        </div>

    </div>

    <script>

        async function generatePDF(){

            const { jsPDF } =
            window.jspdf;

            const doc =
            new jsPDF();

            const text =
            document.getElementById(
                "reportText"
            ).value;

            doc.text(text,10,20);

            doc.save("report.pdf");
        }

    </script>

</body>
</html>
