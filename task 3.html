<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>AI Chatbot</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
        }

        .container{
            width:400px;
            margin:50px auto;
            background:white;
            padding:20px;
            border-radius:10px;
        }

        #chatbox{
            height:300px;
            overflow-y:auto;
            border:1px solid #ccc;
            padding:10px;
            margin-bottom:10px;
        }

        input{
            width:70%;
            padding:10px;
        }

        button{
            padding:10px;
            background:blue;
            color:white;
            border:none;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>AI Chatbot</h1>

        <div id="chatbox"></div>

        <input
        type="text"
        id="userInput"
        placeholder="Ask something">

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

    <script>

        function sendMessage(){

            const input =
            document.getElementById(
                "userInput"
            ).value;

            const chatbox =
            document.getElementById(
                "chatbox"
            );

            chatbox.innerHTML +=
            "<p><b>You:</b> " +
            input +
            "</p>";

            let response =
            getBotResponse(input);

            chatbox.innerHTML +=
            "<p><b>Bot:</b> " +
            response +
            "</p>";
        }

        function getBotResponse(input){

            input = input.toLowerCase();

            if(input.includes("hello")){

                return "Hello User!";
            }

            else if(
                input.includes("weather")
            ){

                return "Today's weather is sunny.";
            }

            else if(
                input.includes("name")
            ){

                return "I am AI Chatbot.";
            }

            else{

                return "Sorry, I don't understand.";
            }
        }

    </script>

</body>
</html>
